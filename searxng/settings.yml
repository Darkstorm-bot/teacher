use_default_settings: true
general:
    debug: false
    instance_name: "HF-Tutor Research"
    donation_url: null
    contact_url: null
    enable_metrics: true
search:
    safe_search: 0
    autocomplete: "google"
    default_lang: "da"
    formats:
        - html
        - json
server:
    secret_key: "hf-tutor-secret-key-change-in-production"
    limiter: false
    image_proxy: true
    http_protocol_version: "1.0"
ui:
    static_use_hash: true
    default_theme: simple
    query_in_title: true
    infinite_scroll: true
    results_on_new_tab: false
outgoing:
    request_timeout: 5.0
    max_request_timeout: 10.0
    useragent_suffix: ""
engines:
    - name: google
        engine: google
        shortcut: g
    - name: wikipedia
        engine: wikipedia
        shortcut: w
    - name: arxiv
        engine: arxiv
        shortcut: a
    - name: duckduckgo
        engine: duckduckgo
        shortcut: d
