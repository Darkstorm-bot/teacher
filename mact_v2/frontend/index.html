<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACT v2.0 - Adaptive Tutor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        .agent-message { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .quiz-card { transition: all 0.2s; }
        .quiz-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                MACT v2.0
            </h1>
            <div class="flex gap-4">
                <button onclick="toggleTTS()" class="px-4 py-2 bg-blue-600 rounded hover:bg-blue-700">🔊 TTS</button>
                <button onclick="showAnalytics()" class="px-4 py-2 bg-purple-600 rounded hover:bg-purple-700">📊 Analytics</button>
            </div>
        </div>
    </header>

    <div class="flex h-[calc(100vh-73px)]">
        <!-- Left Panel: Knowledge Graph & Quiz -->
        <div class="w-1/3 border-r border-gray-700 p-4 overflow-y-auto">
            <div id="graph-container" class="mb-6">
                <h2 class="text-lg font-semibold mb-3">Knowledge Graph</h2>
                <div id="knowledge-graph" class="bg-gray-800 rounded p-4 h-64 flex items-center justify-center">
                    <p class="text-gray-400">Loading graph...</p>
                </div>
            </div>

            <div id="quiz-section" class="mb-6">
                <h2 class="text-lg font-semibold mb-3">Quick Quiz</h2>
                <button onclick="generateQuiz()" class="w-full py-2 bg-green-600 rounded hover:bg-green-700 mb-3">
                    Generate Quiz
                </button>
                <div id="quiz-container"></div>
            </div>

            <div id="review-section">
                <h2 class="text-lg font-semibold mb-3">Spaced Repetition</h2>
                <button onclick="loadReviewQueue()" class="w-full py-2 bg-yellow-600 rounded hover:bg-yellow-700 mb-3">
                    Load Review Cards
                </button>
                <div id="review-container"></div>
            </div>
        </div>

        <!-- Right Panel: Agent Chat & Content -->
        <div class="w-2/3 p-4 flex flex-col">
            <div id="chat-container" class="flex-1 overflow-y-auto mb-4 space-y-3">
                <!-- Messages appear here -->
                <div class="agent-message bg-gray-800 rounded-lg p-4">
                    <p class="text-blue-400 font-semibold">System</p>
                    <p>Welcome to MACT v2.0! Start by generating a quiz or loading your review queue.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="flex gap-2">
                <input 
                    type="text" 
                    id="user-input"
                    placeholder="Ask a question..."
                    class="flex-1 bg-gray-800 border border-gray-700 rounded px-4 py-2 focus:outline-none focus:border-blue-500"
                    onkeypress="if(event.key==='Enter') sendMessage()"
                >
                <button onclick="sendMessage()" class="px-6 py-2 bg-blue-600 rounded hover:bg-blue-700">Send</button>
            </div>
        </div>
    </div>

    <!-- Analytics Modal -->
    <div id="analytics-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-gray-800 rounded-lg p-6 w-3/4 max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between mb-4">
                <h2 class="text-xl font-bold">Learning Analytics</h2>
                <button onclick="closeAnalytics()" class="text-gray-400 hover:text-white">✕</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-gray-700 rounded p-4">
                    <h3 class="font-semibold mb-2">Knowledge Radar</h3>
                    <canvas id="radar-chart"></canvas>
                </div>
                <div class="bg-gray-700 rounded p-4">
                    <h3 class="font-semibold mb-2">Progress Over Time</h3>
                    <canvas id="progress-chart"></canvas>
                </div>
            </div>
            <div id="forecast-section" class="mt-4 bg-gray-700 rounded p-4">
                <h3 class="font-semibold mb-2">Mastery Forecast</h3>
                <div id="forecast-content"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        const USER_ID = 1; // Hardcoded for demo

        // Initialize Mermaid
        mermaid.initialize({ startOnLoad: false, theme: 'dark' });

        // WebSocket Connection
        let ws = new WebSocket(`ws://${API_BASE.replace('http://', '')}/ws/${USER_ID}`);
        ws.onopen = () => addSystemMessage('Connected to server');
        ws.onmessage = (event) => handleWebSocketMessage(JSON.parse(event.data));

        function handleWebSocketMessage(data) {
            if (data.type === 'analytics_update') {
                updateAnalytics(data.data);
            }
        }

        // Quiz Functions
        async function generateQuiz() {
            try {
                const response = await fetch(`${API_BASE}/quiz/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: USER_ID, concept_id: 1, question_count: 3 })
                });
                const data = await response.json();
                displayQuiz(data.quiz);
            } catch (error) {
                addSystemMessage('Error generating quiz: ' + error.message);
            }
        }

        function displayQuiz(quiz) {
            const container = document.getElementById('quiz-container');
            container.innerHTML = quiz.questions.map((q, i) => `
                <div class="quiz-card bg-gray-700 rounded p-3 mb-2">
                    <p class="font-semibold">${i+1}. ${q.question}</p>
                    <div class="mt-2 space-y-1">
                        ${q.options.map(opt => `
                            <label class="block cursor-pointer hover:bg-gray-600 rounded px-2 py-1">
                                <input type="radio" name="q${q.id}" value="${opt}" class="mr-2">
                                ${opt}
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('') + `
                <button onclick="submitQuiz(${quiz.id})" class="w-full py-2 bg-blue-600 rounded hover:bg-blue-700 mt-2">
                    Submit Answers
                </button>
            `;
        }

        async function submitQuiz(quizId) {
            const answers = {};
            document.querySelectorAll('#quiz-container input[type="radio"]:checked').forEach(input => {
                const qId = parseInt(input.name.replace('q', ''));
                answers[qId] = input.value;
            });

            try {
                const response = await fetch(`${API_BASE}/quiz/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quiz_id: quizId, user_id: USER_ID, answers })
                });
                const data = await response.json();
                addSystemMessage(`Quiz submitted! Score: ${(data.result.score * 100).toFixed(0)}%`);
            } catch (error) {
                addSystemMessage('Error submitting quiz: ' + error.message);
            }
        }

        // Review Functions
        async function loadReviewQueue() {
            try {
                const response = await fetch(`${API_BASE}/review/queue`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: USER_ID, count: 5 })
                });
                const data = await response.json();
                displayReviewCards(data.cards);
            } catch (error) {
                addSystemMessage('Error loading reviews: ' + error.message);
            }
        }

        function displayReviewCards(cards) {
            const container = document.getElementById('review-container');
            if (cards.length === 0) {
                container.innerHTML = '<p class="text-gray-400">No cards due for review!</p>';
                return;
            }
            container.innerHTML = cards.map((card, i) => `
                <div class="bg-gray-700 rounded p-3 mb-2">
                    <p class="font-semibold">${card.question}</p>
                    <details class="mt-2">
                        <summary class="cursor-pointer text-blue-400">Show Answer</summary>
                        <p class="mt-2 text-green-400">${card.answer}</p>
                        <div class="mt-2 flex gap-2">
                            {[1,2,3,4,5].map(rating => `
                                <button onclick="submitReview(${card.id}, ${rating})" 
                                    class="px-3 py-1 bg-gray-600 rounded hover:bg-green-600 text-sm">
                                    ${rating}
                                </button>
                            `).join('')}
                        </div>
                    </details>
                </div>
            `).join('');
        }

        async function submitReview(cardId, rating) {
            try {
                await fetch(`${API_BASE}/review/submit?user_id=${USER_ID}&card_id=${cardId}&rating=${rating}`, {
                    method: 'POST'
                });
                addSystemMessage(`Review submitted with rating: ${rating}`);
                loadReviewQueue(); // Refresh
            } catch (error) {
                addSystemMessage('Error submitting review: ' + error.message);
            }
        }

        // Analytics Functions
        async function showAnalytics() {
            document.getElementById('analytics-modal').classList.remove('hidden');
            try {
                const [dashboard, radar] = await Promise.all([
                    fetch(`${API_BASE}/analytics/dashboard/${USER_ID}`).then(r => r.json()),
                    fetch(`${API_BASE}/analytics/knowledge-radar/${USER_ID}`).then(r => r.json())
                ]);
                
                renderRadarChart(radar.radar);
                renderProgressChart(dashboard.data);
                renderForecast(dashboard.data.forecast);
            } catch (error) {
                addSystemMessage('Error loading analytics: ' + error.message);
            }
        }

        function closeAnalytics() {
            document.getElementById('analytics-modal').classList.add('hidden');
        }

        function renderRadarChart(radarData) {
            const ctx = document.getElementById('radar-chart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: Object.keys(radarData),
                    datasets: [{
                        label: 'Mastery Level',
                        data: Object.values(radarData),
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        borderColor: 'rgb(59, 130, 246)',
                        borderWidth: 2
                    }]
                },
                options: { scales: { r: { min: 0, max: 1 } } }
            });
        }

        function renderProgressChart(dashboardData) {
            const ctx = document.getElementById('progress-chart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                    datasets: [{
                        label: 'Concepts Mastered',
                        data: dashboardData.metrics?.concepts_mastered || [0, 0, 0, 0],
                        borderColor: 'rgb(168, 85, 247)',
                        tension: 0.4
                    }]
                }
            });
        }

        function renderForecast(forecast) {
            const container = document.getElementById('forecast-content');
            container.innerHTML = forecast.map(f => `
                <div class="flex justify-between py-2 border-b border-gray-600">
                    <span>${f.concept}</span>
                    <span class="text-green-400">${f.predicted_date}</span>
                </div>
            `).join('');
        }

        // Chat Functions
        function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            addMessage('User', message, 'text-right');
            input.value = '';

            // Simulate agent response (replace with actual API call)
            setTimeout(() => {
                addMessage('Teacher', 'Great question! Let me explain...', 'text-left');
            }, 500);
        }

        function addMessage(sender, content, align) {
            const container = document.getElementById('chat-container');
            const colors = {
                'User': 'bg-blue-600',
                'Teacher': 'bg-green-600',
                'Einstein': 'bg-yellow-600',
                'Programmer': 'bg-purple-600',
                'Critic': 'bg-red-600',
                'System': 'bg-gray-600'
            };
            
            container.innerHTML += `
                <div class="agent-message ${colors[sender] || 'bg-gray-700'} rounded-lg p-3 max-w-md ${align} ml-auto">
                    <p class="font-semibold text-sm">${sender}</p>
                    <p>${content}</p>
                </div>
            `;
            container.scrollTop = container.scrollHeight;
        }

        function addSystemMessage(msg) {
            addMessage('System', msg, 'text-left');
        }

        // TTS Placeholder
        function toggleTTS() {
            addSystemMessage('TTS feature ready - integrate Piper/Coqui backend');
        }

        // Load knowledge graph
        async function loadKnowledgeGraph() {
            const container = document.getElementById('knowledge-graph');
            container.innerHTML = `
                <div class="text-center">
                    <p class="text-green-400">● Concepts Learned: 12</p>
                    <p class="text-yellow-400">● In Progress: 3</p>
                    <p class="text-gray-400">○ Pending: 8</p>
                </div>
            `;
        }

        // Initialize
        loadKnowledgeGraph();
    </script>
</body>
</html>
