<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACT - Multi-Agent Cognitive Tutor</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f1419; color: #e7e9ea; height: 100vh; overflow: hidden; }
        
        .container { display: flex; height: 100vh; }
        
        /* Left Pane - Knowledge Graph */
        .graph-pane { 
            flex: 1; 
            background: #161b22; 
            border-right: 1px solid #30363d;
            position: relative;
            overflow: hidden;
        }
        .graph-header {
            padding: 15px;
            background: #21262d;
            border-bottom: 1px solid #30363d;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #knowledge-graph { width: 100%; height: calc(100% - 50px); }
        
        /* Right Pane - Chat Stream */
        .chat-pane { 
            flex: 1.5; 
            display: flex; 
            flex-direction: column; 
            background: #0d1117;
        }
        .chat-header {
            padding: 15px;
            background: #21262d;
            border-bottom: 1px solid #30363d;
            font-weight: bold;
        }
        .chat-stream {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .message.teacher { background: #1f6feb; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message.simplifier { background: #238636; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message.builder { background: #8957e5; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message.critic { background: #da3633; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.synthesizer { background: #30363d; align-self: center; border: 1px solid #8b949e; }
        
        .agent-label {
            font-size: 0.75rem;
            font-weight: bold;
            opacity: 0.8;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        
        .input-area {
            padding: 20px;
            background: #21262d;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #e7e9ea;
            font-size: 1rem;
        }
        .input-area button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: #1f6feb;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-area button:hover { background: #388bfd; }
        
        /* Node Styles for D3 Graph */
        .node circle { stroke: #fff; stroke-width: 2px; }
        .node.mastered circle { fill: #238636; }
        .node.learning circle { fill: #1f6feb; }
        .node.locked circle { fill: #484f58; }
        .link { stroke: #484f58; stroke-opacity: 0.6; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }
        
        /* Future TTS/Video Hooks */
        .media-controls {
            display: none; /* Hidden until implemented */
            gap: 10px;
            padding: 10px;
            background: #161b22;
            border-top: 1px solid #30363d;
        }
        .media-controls button {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #21262d;
            color: #e7e9ea;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Pane: Knowledge Graph -->
        <div class="graph-pane">
            <div class="graph-header">
                <span>📚 Knowledge Graph</span>
                <span id="progress-indicator">0% Mastered</span>
            </div>
            <svg id="knowledge-graph"></svg>
        </div>
        
        <!-- Right Pane: Chat Stream -->
        <div class="chat-pane">
            <div class="chat-header">
                <span>💬 Panel Discussion</span>
            </div>
            <div class="chat-stream" id="chat-stream">
                <!-- Messages will be injected here -->
                <div class="message synthesizer">
                    <div class="agent-label">System</div>
                    Welcome! Upload a PDF or ask a question to begin your personalized lesson.
                </div>
            </div>
            
            <!-- Future Media Controls -->
            <div class="media-controls" id="media-controls">
                <button onclick="toggleTTS()">🔊 TTS</button>
                <button onclick="generateVideo()">🎥 Generate Video</button>
            </div>
            
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask a question or request a topic..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        // === KNOWLEDGE GRAPH VISUALIZATION (D3.js) ===
        const width = document.querySelector('.graph-pane').clientWidth;
        const height = document.querySelector('.graph-pane').clientHeight - 50;
        
        // Sample data (will be replaced by real API calls)
        let graphData = {
            nodes: [
                { id: "functions", label: "Functions", status: "mastered" },
                { id: "limits", label: "Limits", status: "learning" },
                { id: "derivatives", label: "Derivatives", status: "locked" },
                { id: "integrals", label: "Integrals", status: "locked" }
            ],
            links: [
                { source: "functions", target: "limits" },
                { source: "limits", target: "derivatives" },
                { source: "derivatives", target: "integrals" }
            ]
        };
        
        const svg = d3.select("#knowledge-graph")
            .attr("width", width)
            .attr("height", height)
            .call(d3.zoom().on("zoom", (event) => {
                g.attr("transform", event.transform);
            }))
            .append("g");
        
        const g = svg.append("g");
        
        const simulation = d3.forceSimulation(graphData.nodes)
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("link", d3.forceLink(graphData.links).distance(120))
            .force("collide", d3.forceCollide(40));
        
        // Draw links
        const link = g.selectAll(".link")
            .data(graphData.links)
            .join("line")
            .attr("class", "link");
        
        // Draw nodes
        const node = g.selectAll(".node")
            .data(graphData.nodes)
            .join("g")
            .attr("class", d => `node ${d.status}`)
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));
        
        node.append("circle").attr("r", 20);
        
        node.append("text")
            .text(d => d.label)
            .attr("x", 25)
            .attr("y", 5)
            .style("font-size", "12px")
            .style("fill", "#e7e9ea");
        
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);
            
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });
        
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
        
        // Update progress indicator
        function updateProgress() {
            const total = graphData.nodes.length;
            const mastered = graphData.nodes.filter(n => n.status === "mastered").length;
            const percent = Math.round((mastered / total) * 100);
            document.getElementById("progress-indicator").textContent = `${percent}% Mastered`;
        }
        updateProgress();
        
        // === CHAT STREAM FUNCTIONS ===
        function addMessage(role, content) {
            const stream = document.getElementById("chat-stream");
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${role}`;
            msgDiv.innerHTML = `<div class="agent-label">${role}</div><div>${content}</div>`;
            stream.appendChild(msgDiv);
            stream.scrollTop = stream.scrollHeight;
        }
        
        function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if (!text) return;
            
            // Add user message (visual only, backend integration needed)
            addMessage("user", text);
            input.value = "";
            
            // Simulate agent responses (replace with actual API call)
            setTimeout(() => addMessage("teacher", "Let me structure this topic for you..."), 500);
            setTimeout(() => addMessage("simplifier", "Think of it like adjusting volume knobs on a stereo..."), 1500);
            setTimeout(() => addMessage("builder", "Here's the technical breakdown:<br><code>for layer in network:</code>"), 2500);
            setTimeout(() => addMessage("critic", "Wait, the analogy hides the gradient descent mechanism."), 3500);
            setTimeout(() => addMessage("synthesizer", "Final explanation: Neural networks learn by iteratively adjusting weights..."), 5000);
        }
        
        // === FUTURE HOOKS ===
        function toggleTTS() {
            alert("TTS integration pending - connect to your preferred TTS API");
        }
        
        function generateVideo() {
            alert("Video generation pending - integrate with Sora/Runway API when available");
        }
        
        // Auto-resize graph on window resize
        window.addEventListener('resize', () => {
            const newWidth = document.querySelector('.graph-pane').clientWidth;
            const newHeight = document.querySelector('.graph-pane').clientHeight - 50;
            svg.attr("width", newWidth).attr("height", newHeight);
            simulation.force("center", d3.forceCenter(newWidth / 2, newHeight / 2));
            simulation.alpha(0.3).restart();
        });
    </script>
</body>
</html>
